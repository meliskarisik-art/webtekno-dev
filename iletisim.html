<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Melis Zeynep</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Melis Zeynep</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Ana Sayfa</a>
                <a class="nav-link" href="sehrim.html">Şehrim</a>
                <a class="nav-link active" href="iletisim.html">İletişim</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4">
                    <h2 class="ozgecmis-baslik border-bottom border-danger pb-2 mb-4">Benimle İletişime Geçin</h2>
                    
                    <form action="iletisim.html" method="POST">
                        
                        <div class="mb-3">
                            <label for="ad" class="form-label fw-bold">Adınız Soyadınız</label>
                            <input type="text" class="form-control" id="ad" placeholder="Adınızı girin" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">E-posta Adresiniz</label>
                            <input type="email" class="form-control" id="email" placeholder="ornek@mail.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="konu" class="form-label fw-bold">Konu</label>
                            <select class="form-select" id="konu">
                                <option value="is">İş Teklifi</option>
                                <option value="proje">Proje Hakkında</option>
                                <option value="diger">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="mesaj" class="form-label fw-bold">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" rows="5" placeholder="Mesajınızı buraya yazın..." required></textarea>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-block">
                            <button type="submit" class="btn btn-primary px-4">Gönder</button>
                            <button type="reset" class="btn btn-secondary px-4">Temizle</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
